syntax = "proto3";

package cache;

service CacheService {
  rpc Get (CacheKey) returns (CacheValue);
  rpc MultiGet (MultiCacheKeyRequest) returns (MultiCacheValueResponse);
  rpc Set (CacheItem) returns (CacheResponse);
  rpc MultiSet (MultiCacheItemRequest) returns (MultiCacheResponse);
  rpc Delete (CacheKey) returns (CacheResponse);
  rpc MultiDelete (MultiCacheKeyRequest) returns (MultiCacheResponse);
  rpc Stats (Empty) returns (CacheStats);
}

enum CacheStatus {
  CACHE_STATUS_UNSPECIFIED = 0;
  OK = 1;
  ERROR = 2;
}

message CacheKey {
  string key = 1;
}

message MultiCacheKeyRequest {
  repeated string keys = 1;
}

message CacheItem {
  string key = 1;
  bytes value = 2;
  int32 ttl = 3;
}

message MultiCacheItemRequest {
  repeated CacheItem items = 1;
}

message CacheValue {
  bool found = 1;
  bytes value = 2;
}

message CacheLookup {
  string key = 1;
  bool found = 2;
  bytes value = 3;
  string error = 4;
}

message MultiCacheValueResponse {
  repeated CacheLookup items = 1;
}

message CacheResponse {
  CacheStatus status = 1;
}

message CacheOperationResult {
  string key = 1;
  CacheStatus status = 2;
  string error = 3;
}

message MultiCacheResponse {
  repeated CacheOperationResult items = 1;
}

message CacheStats {
  int32 size = 1;
  int32 hits = 2;
  int32 misses = 3;
  int32 evictions = 4;
  double hit_rate = 5;
  int64 memory_usage_bytes = 6;
  int64 max_memory_bytes = 7;
  int32 max_items = 8;
}

message Empty {}
