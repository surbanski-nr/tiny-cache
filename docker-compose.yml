services:
  cache-service:
    build:
      context: .
    restart: unless-stopped
    ports:
      # Override host ports or project name at the CLI for parallel stacks.
      - "${CACHE_PORT_HOST:-50051}:${CACHE_PORT:-50051}"
      - "${CACHE_HEALTH_PORT_HOST:-58080}:${CACHE_HEALTH_PORT:-8080}"
    environment:
      - CACHE_LOG_LEVEL=${CACHE_LOG_LEVEL:-INFO}
      - CACHE_PORT=${CACHE_PORT:-50051}
      - CACHE_HEALTH_HOST=${CACHE_HEALTH_HOST:-0.0.0.0}
      - CACHE_HEALTH_PORT=${CACHE_HEALTH_PORT:-8080}
      # Use CACHE_BACKEND=sqlite to persist entries in CACHE_SQLITE_PATH.
      - CACHE_BACKEND=${CACHE_BACKEND:-memory}
      - CACHE_SQLITE_PATH=${CACHE_SQLITE_PATH:-tiny-cache.sqlite3}
