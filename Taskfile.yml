version: "3"

tasks:
  gen:
    desc: Generate protobuf stubs
    sources:
      - cache.proto
    generates:
      - cache_pb2.py
      - cache_pb2_grpc.py
      - cache_pb2.pyi
    cmds:
      - timeout 120s uv run python -m grpc_tools.protoc -I. --python_out=. --pyi_out=. --grpc_python_out=. cache.proto

  clean:
    desc: Remove generated protobuf stubs
    cmds:
      - timeout 120s uv run python -c "import os; [os.remove(p) for p in ('cache_pb2.py','cache_pb2_grpc.py','cache_pb2.pyi') if os.path.exists(p)]"

  test:
    desc: Run unit, integration, and concurrency tests
    deps: [gen]
    cmds:
      - timeout 180s uv run pytest tests/unit
      - timeout 240s uv run pytest tests/integration
      - timeout 180s uv run pytest tests/concurrency

  test-unit:
    desc: Run unit tests
    deps: [gen]
    cmds:
      - timeout 180s uv run pytest tests/unit

  test-integration:
    desc: Run integration tests
    deps: [gen]
    cmds:
      - timeout 240s uv run pytest tests/integration

  test-concurrency:
    desc: Run concurrency tests
    deps: [gen]
    cmds:
      - timeout 180s uv run pytest tests/concurrency

  format:
    desc: Auto-format code (ruff)
    cmds:
      - timeout 120s uv run ruff format .

  lint:
    desc: Lint code (ruff)
    cmds:
      - timeout 120s uv run ruff check .

  typecheck:
    desc: Typecheck code (basedpyright)
    deps: [gen]
    cmds:
      - timeout 180s uv run basedpyright
